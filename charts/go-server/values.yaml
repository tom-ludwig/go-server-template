# Default values for go-server

replicaCount: 1

image:
  repository: ghcr.io/tom-ludwig/go-server-template
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# =============================================================================
# Environment Configuration
# =============================================================================
# Supports three patterns:
#   1. Direct value:      { value: "something" }
#   2. Secret reference:  { secretKeyRef: { name: "secret-name", key: "key-name" } }
#   3. ConfigMap ref:     { configMapKeyRef: { name: "cm-name", key: "key-name" } }
#
# Example with CNPG-generated secrets:
#   PG_HOST:
#     secretKeyRef:
#       name: my-cluster-app
#       key: host
# =============================================================================

env:
  # Server configuration
  PORT:
    value: "8080"
  LOG_LEVEL:
    value: "INFO"

  # Database configuration - typically from CNPG secrets
  # The CNPG operator creates a secret named "<cluster-name>-app" with these keys:
  #   host, port, dbname, username, password, uri, jdbc-uri
  PG_HOST:
    value: "localhost"
    # secretKeyRef:
    #   name: my-cluster-app
    #   key: host
  PG_PORT:
    value: "5432"
    # secretKeyRef:
    #   name: my-cluster-app
    #   key: port
  PG_DB:
    value: "app"
    # secretKeyRef:
    #   name: my-cluster-app
    #   key: dbname
  PG_USER:
    value: "app"
    # secretKeyRef:
    #   name: my-cluster-app
    #   key: username
  PG_PASSWORD:
    value: ""
    # secretKeyRef:
    #   name: my-cluster-app
    #   key: password
  PG_SSLMODE:
    value: "verify-full"
  PG_LOCAL:
    value: "false"

  # CORS configuration
  CORS_ALLOWED_ORIGINS:
    value: "*"
  CORS_ALLOW_CREDENTIALS:
    value: "true"

  # OIDC configuration
  OIDC_ENABLED:
    value: "false"
  OIDC_ISSUER:
    value: ""
  OIDC_AUDIENCE:
    value: ""

# Additional environment variables (merged with env above)
extraEnv: []
# - name: CUSTOM_VAR
#   value: "custom-value"
# - name: SECRET_VAR
#   valueFrom:
#     secretKeyRef:
#       name: my-secret
#       key: my-key

# =============================================================================
# TLS/SSL Certificates for Postgres
# Mount certificates from CNPG secrets for mTLS connections
pgTLS:
  enabled: false
  # Secret containing client certificates (created by CNPG)
  clientSecret: ""
  # Secret containing CA certificate (created by CNPG)
  caSecret: ""
  # Mount path for certificates
  mountPath: /certs

# =============================================================================
# Database Migrations
# =============================================================================
# Uses pg-schema-diff for declarative schema migrations.
# The schema.sql file is mounted from ConfigMap and applied to the database.
migrations:
  enabled: true

  # Migration image (must include pg-schema-diff binary)
  image:
    repository: ghcr.io/tom-ludwig/pg-schema-diff-image
    tag: latest

  # Schema file path (default: migrations/schema.sql)
  # This should point to the schema.sql file in the migrations directory
  schemaFile: migrations/schema.sql

  # Optional: Define schema.sql inline (overrides auto-read from directory)
  schema: ""
  #   schema: |
  #     CREATE TABLE users (...);

  # Optional: Use an existing ConfigMap (overrides both 'schema' and auto-read)
  existingConfigMap: ""

  # Optional: Separate credentials for migration user (with CREATEDB privilege)
  # If not set, uses the same credentials as the app (PG_USER, PG_PASSWORD, etc.)
  # The migration user needs CREATEDB privilege for pg-schema-diff plan validation
  credentials:
    enabled: false
    # username:
    #   value: "migrator"
    #   # Or use secretKeyRef:
    #   # secretKeyRef:
    #   #   name: cluster-example-migrator
    #   #   key: username
    # password:
    #   value: ""
    #   # Or use secretKeyRef:
    #   # secretKeyRef:
    #   #   name: cluster-example-migrator
    #   #   key: password

  # Resources for migration job
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 64Mi

  # Backoff limit for failed migrations
  backoffLimit: 3

  # TTL for completed jobs (seconds) - auto-cleanup
  ttlSecondsAfterFinished: 300

  # Additional annotations for the migration job
  annotations: {}
