{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "go-server.migrationName" . }}
  labels:
    {{- include "go-server.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    # Run before install/upgrade, delete on success
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    {{- with .Values.migrations.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.migrations.ttlSecondsAfterFinished }}
  ttlSecondsAfterFinished: {{ .Values.migrations.ttlSecondsAfterFinished }}
  {{- end }}
  backoffLimit: {{ .Values.migrations.backoffLimit | default 3 }}
  template:
    metadata:
      labels:
        {{- include "go-server.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      restartPolicy: Never
      containers:
        - name: schema-migration
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.migrations.image.repository }}:{{ .Values.migrations.image.tag }}"
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -e
              {{- if and .Values.migrations.credentials .Values.migrations.credentials.enabled }}
              # Use dedicated migration user credentials
              DB_USER="${MIGRATE_USER}"
              DB_PASS="${MIGRATE_PASSWORD}"
              {{- else }}
              # Use app credentials
              DB_USER="${PG_USER}"
              DB_PASS="${PG_PASSWORD}"
              {{- end }}
              {{- if .Values.pgTLS.enabled }}
              export DATABASE_URL="postgres://${DB_USER}:${DB_PASS}@${PG_HOST}:${PG_PORT}/${PG_DB}?sslmode=${PG_SSLMODE}&sslcert=${PG_CLIENT_CERT}&sslkey=${PG_CLIENT_KEY}&sslrootcert=${PG_SSLROOTCERT}"
              {{- else }}
              export DATABASE_URL="postgres://${DB_USER}:${DB_PASS}@${PG_HOST}:${PG_PORT}/${PG_DB}?sslmode=${PG_SSLMODE}"
              {{- end }}
              echo "Applying schema from /schema directory..."
              pg-schema-diff apply \
                --from-dsn "${DATABASE_URL}" \
                --to-dir "/schema" \
                --skip-confirm-prompt \
                --allow-hazards DELETES_DATA,INDEX_BUILD
          env:
            {{- include "go-server.envVars" . | nindent 12 }}
            {{- if and .Values.migrations.credentials .Values.migrations.credentials.enabled }}
            {{- with .Values.migrations.credentials.username }}
            - name: MIGRATE_USER
              {{- if .value }}
              value: {{ .value | quote }}
              {{- else if .secretKeyRef }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretKeyRef.name }}
                  key: {{ .secretKeyRef.key }}
              {{- end }}
            {{- end }}
            {{- with .Values.migrations.credentials.password }}
            - name: MIGRATE_PASSWORD
              {{- if .value }}
              value: {{ .value | quote }}
              {{- else if .secretKeyRef }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretKeyRef.name }}
                  key: {{ .secretKeyRef.key }}
              {{- end }}
            {{- end }}
            {{- end }}
            {{- if .Values.pgTLS.enabled }}
            - name: PG_CLIENT_CERT
              value: {{ .Values.pgTLS.mountPath }}/tls.crt
            - name: PG_CLIENT_KEY
              value: {{ .Values.pgTLS.mountPath }}/tls.key
            - name: PG_SSLROOTCERT
              value: {{ .Values.pgTLS.mountPath }}/ca.crt
            {{- end }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
          volumeMounts:
            - name: schema
              mountPath: /schema
              readOnly: true
            {{- if .Values.pgTLS.enabled }}
            - name: pg-client-certs
              mountPath: {{ .Values.pgTLS.mountPath }}
              readOnly: true
            {{- end }}
      volumes:
        - name: schema
          configMap:
            {{- if .Values.migrations.existingConfigMap }}
            name: {{ .Values.migrations.existingConfigMap }}
            {{- else }}
            name: {{ include "go-server.fullname" . }}-schema
            {{- end }}
        {{- if .Values.pgTLS.enabled }}
        - name: pg-client-certs
          projected:
            defaultMode: 0600
            sources:
              {{- if .Values.pgTLS.clientSecret }}
              - secret:
                  name: {{ .Values.pgTLS.clientSecret }}
                  items:
                    - key: tls.crt
                      path: tls.crt
                    - key: tls.key
                      path: tls.key
              {{- end }}
              {{- if .Values.pgTLS.caSecret }}
              - secret:
                  name: {{ .Values.pgTLS.caSecret }}
                  items:
                    - key: ca.crt
                      path: ca.crt
              {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
