{{- if .Values.migrations.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "go-server.fullname" . }}-schema
  labels:
    {{- include "go-server.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
data:
  {{- /* Priority: existingConfigMap > schema in values > schema.sql from chart directory */}}
  {{- if not .Values.migrations.existingConfigMap }}
    {{- $schemaFilePath := .Values.migrations.schemaFile | default "migrations/schema.sql" }}
    {{- $schemaFileName := base $schemaFilePath }}
    {{- if .Values.migrations.schema }}
      {{- /* Use schema defined inline in values.yaml */}}
  {{ $schemaFileName }}: |
{{ .Values.migrations.schema | indent 4 }}
    {{- else }}
      {{- /* Auto-read schema.sql from migrations directory in chart */}}
      {{- $schemaContent := .Files.Get $schemaFilePath }}
      {{- if $schemaContent }}
  {{ $schemaFileName }}: |
{{ $schemaContent | indent 4 }}
      {{- else }}
        {{- fail (printf "No schema file found at %s. Add schema.sql to charts/go-server/migrations/ or define migrations.schema in values.yaml" $schemaFilePath) }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
